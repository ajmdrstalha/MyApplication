<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>রাবেয়া জেনারেল স্টোর - Sales Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --md-sys-color-primary: #004a77;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-surface: #fdfbff;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #dfe2eb;
            --md-sys-color-on-surface-variant: #43474e;
            --md-sys-color-outline: #73777f;
            --md-sys-color-secondary: #526070;
            --md-sys-color-error: #ba1a1a;
            --shadow-1: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px 0 rgba(0,0,0,0.06);
            --shadow-2: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            overflow-x: hidden;
            width: 100vw;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', system-ui, -apple-system, sans-serif;
            background-color: #f4f7fa;
            color: var(--md-sys-color-on-surface);
            line-height: 1.5;
        }

        input { max-width: 100%; font-size: 16px; }

        /* Fixed Header Section */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--md-sys-color-primary);
            color: white;
            padding: 0 16px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-nav h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
        }

        .search-container {
            position: fixed;
            top: 44px;
            left: 0;
            right: 0;
            z-index: 999;
            background: #f4f7fa;
            padding: 6px 16px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-bar {
            flex: 1;
            padding: 4px 16px;
            border: 2px solid var(--md-sys-color-outline);
            border-radius: 28px;
            font-size: 14px;
            background: white;
            color: black;
            font-weight: 600;
            height: 36px;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 2px rgba(0,74,119,0.2);
        }

        .settings-trigger {
            background: white;
            color: var(--md-sys-color-primary);
            border: 2px solid var(--md-sys-color-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-1);
            cursor: pointer;
            padding: 0;
        }

        /* Container & Grid */
        .content {
            padding: 100px 16px 180px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .header-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
            background: white;
            padding: 12px;
            border-radius: 16px;
            box-shadow: var(--shadow-1);
            width: 100%;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .field-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--md-sys-color-secondary);
            text-transform: uppercase;
        }

        .field-group input {
            padding: 8px;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }

        /* Card Layout */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 8px;
            box-shadow: var(--shadow-1);
            border: 1px solid #e0e0e0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            gap: 8px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 900;
            color: var(--md-sys-color-primary);
            margin: 0;
            flex: 1;
            word-break: break-word;
            line-height: 1.2;
        }

        .item-total {
            font-size: 16px;
            font-weight: 900;
            color: #000;
            background: #eef2f6;
            padding: 2px 8px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .price-info {
            font-size: 11px;
            color: #555;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .interaction-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .qty-box {
            background: #f8f9fa;
            padding: 4px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #eee;
            flex: 1;
            min-width: 0;
        }

        .qty-label {
            font-size: 9px;
            font-weight: 800;
            color: #666;
            margin-bottom: 2px;
            display: block;
            text-transform: uppercase;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
        }

        .btn-circle {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            border: none;
            background: var(--md-sys-color-primary);
            color: white;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-1);
            flex-shrink: 0;
        }

        .btn-circle:active { background: #003556; }

        .qty-value {
            font-size: 15px;
            font-weight: 900;
            min-width: 25px;
            color: #000;
            text-align: center;
        }

        /* --- STICKY FOOTER --- */
        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 20px));
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            border-top: 1px solid #eee;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 8px;
        }

        .total-pill {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 12px;
            background: #f0f4f8;
            min-width: 0;
        }

        .total-label {
            font-size: 8px;
            font-weight: 800;
            color: #666;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 2px;
        }

        .total-value {
            font-size: 13px;
            font-weight: 900;
            color: var(--md-sys-color-primary);
            line-height: 1;
        }

        .main-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .button-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        .button-row-2 {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 6px;
        }

        .btn-action {
            padding: 10px 4px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            font-size: 11px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            box-shadow: var(--shadow-1);
        }

        .btn-pdf { background: #2e7d32; }
        .btn-history { background: #1976d2; }
        .btn-reset { background: #d32f2f; }
        .btn-draft { background: #fb8c00; }
        .btn-load { background: #7b1fa2; }

        /* Overlay Styles */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            padding: 20px;
        }

        .overlay-content {
            background: white;
            width: 100%;
            max-width: 500px;
            height: 90%;
            margin: 20px auto;
            border-radius: 24px;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: -20px;
            margin: -20px -20px 20px -20px;
            padding: 20px;
            background: white;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }

        .history-item, .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        .manage-info {
            flex: 1;
            margin-right: 10px;
        }

        .manage-info strong {
            display: block;
            font-size: 14px;
            color: #333;
        }

        .manage-info span {
            font-size: 12px;
            color: #666;
        }

        .btn-view {
            background: #e3f2fd;
            color: #1976d2;
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
        }

        .btn-small {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-size: 12px;
            font-weight: 800;
            color: white;
        }

        .btn-edit { background: #fbc02d; margin-right: 4px; }
        .btn-delete { background: #d32f2f; }

        .btn-add { background: var(--md-sys-color-primary); width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; border: none; color: white; font-weight: bold; }

        .manage-form {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .manage-form input {
            width: 100%;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        /* PDF Printing helper */
        #pdfCapture {
            background: white;
            color: black;
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <h1>রাবেয়া জেনারেল স্টোর</h1>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="পণ্য খুঁজুন (Search)...">
        <button class="settings-trigger" onclick="showSettings()">⚙️</button>
    </div>

    <div class="content">
        <div class="header-fields">
            <div class="field-group">
                <label>DSR Name</label>
                <input type="text" id="dsrName" placeholder="নাম">
            </div>
            <div class="field-group">
                <label>Date</label>
                <input type="date" id="saleDate">
            </div>
        </div>

        <div class="field-group" style="background: white; padding: 12px; border-radius: 16px; margin-bottom: 12px; box-shadow: var(--shadow-1);">
            <label>Deposit (জমা)</label>
            <input type="number" id="depositAmount" placeholder="জমা টাকার পরিমাণ">
        </div>

        <div id="productArea" class="product-list">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!-- Hidden element for PDF Capture -->
    <div id="pdfCapture" style="position: absolute; left: -9999px; width: 800px; padding: 40px; background: white;">
        <div id="pdfHeader">
            <h1 style="text-align: center; color: #004a77; margin-bottom: 10px;">রাবেয়া জেনারেল স্টোর</h1>
            <h2 style="text-align: center; margin-bottom: 30px;">সেলস রিপোর্ট</h2>

            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #004a77; padding-bottom: 10px; font-weight: bold; font-size: 18px;">
                <div id="pdfDsr">DSR: -</div>
                <div id="pdfDate">Date: -</div>
            </div>
        </div>

        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
            <thead>
                <tr style="background: #f0f4f8;">
                    <th style="border: 1px solid #ccc; padding: 12px; text-align: left;">Product (পণ্য)</th>
                    <th style="border: 1px solid #ccc; padding: 12px; text-align: center; width: 80px;">Ctn</th>
                    <th style="border: 1px solid #ccc; padding: 12px; text-align: center; width: 80px;">Pcs</th>
                    <th style="border: 1px solid #ccc; padding: 12px; text-align: right; width: 120px;">Total</th>
                </tr>
            </thead>
            <tbody id="pdfTableBody" style="font-size: 16px;">
                <!-- Rows injected by JS -->
            </tbody>
        </table>

        <div id="pdfSummarySection" style="display: flex; justify-content: flex-end;">
            <div style="width: 300px; font-size: 18px; line-height: 1.8;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Grand Total:</span>
                    <span id="pdfGrandTotal">0</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>2% Total:</span>
                    <span id="pdfTwoPercent">0</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Deposit (জমা):</span>
                    <span id="pdfDeposit">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 900; border-top: 2px solid #000; margin-top: 10px; padding-top: 10px; color: #c62828;">
                    <span>Due (বাকি):</span>
                    <span id="pdfDue">0</span>
                </div>
            </div>
        </div>

        <div id="pdfFooterSection" style="margin-top: 50px; text-align: center; font-style: italic; color: #666;">
            Thank you for your business!
        </div>
    </div>

    <!-- NEW COMPACT FOOTER -->
    <div class="sticky-footer">
        <div class="totals-row">
            <div class="total-pill">
                <span class="total-label">Grand Total</span>
                <span class="total-value" id="grandTotal">0</span>
            </div>
            <div class="total-pill">
                <span class="total-label">2% Total</span>
                <span class="total-value" id="twoPercent">0</span>
            </div>
            <div class="total-pill" style="background: #ffebee;">
                <span class="total-label">Due (বাকি)</span>
                <span class="total-value" id="dueAmount" style="color: #c62828;">0</span>
            </div>
        </div>
        <div class="main-actions">
            <div class="button-row-3">
                <button class="btn-action btn-draft" onclick="saveDraft()">Save Draft</button>
                <button class="btn-action btn-load" onclick="loadDraft()">Load Draft</button>
                <button class="btn-action btn-reset" onclick="resetForm()">Reset</button>
            </div>
            <div class="button-row-2">
                <button class="btn-action btn-history" onclick="showHistory()">DSR Data</button>
                <button class="btn-action btn-pdf" onclick="generatePDF()">Save PDF</button>
            </div>
        </div>
    </div>

    <!-- History Overlay -->
    <div id="historyOverlay" class="overlay">
        <div class="overlay-content" id="historyOverlayContent">
            <div class="overlay-header">
                <h2 style="margin:0; color: var(--md-sys-color-primary); font-size: 18px;">Saved Reports</h2>
                <button onclick="hideHistory()" style="background:none; border:none; font-size:28px; line-height: 1;">&times;</button>
            </div>
            <div id="fileListContainer">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div id="settingsOverlay" class="overlay">
        <div class="overlay-content" id="settingsOverlayContent">
            <div class="overlay-header">
                <h2 style="margin:0; color: var(--md-sys-color-primary); font-size: 18px;">Product Management</h2>
                <button onclick="hideSettings()" style="background:none; border:none; font-size:28px; line-height: 1;">&times;</button>
            </div>

            <!-- New Toggle Button at Top -->
            <button class="btn-add" style="margin-bottom: 15px;" id="btnToggleForm" onclick="toggleManageForm()">+ Add New Product</button>

            <!-- manageForm section implementation -->
            <div class="manage-form" id="manageFormContainer" style="display: none;">
                <h3 style="margin-top:0; font-size: 14px;" id="manageFormTitle">Add New Product</h3>
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="newProductName" placeholder="Product Name (পণ্যের নাম)">
                <input type="number" id="newCartonPrice" placeholder="Carton Price (কার্টুন মূল্য)">
                <input type="number" id="newPiecePrice" placeholder="Piece Price (পিস মূল্য)">
                <button class="btn-add" id="btnSaveProduct" onclick="saveProduct()">Add Product</button>
                <button class="btn-action btn-reset" id="btnCancelEdit" style="width:100%; margin-top:10px; background: #666;" onclick="resetProductForm()">Cancel</button>
            </div>

            <div id="manageListContainer" style="margin-bottom: 20px;">
                <!-- Loaded via JS -->
            </div>

            <button class="btn-action btn-reset" style="width:100%;" onclick="resetInventory()">Reset to Factory Default</button>
        </div>
    </div>

    <script>
        const defaultProducts = [
            ["ব্রেড ৭০০ গ্রাম", 372, 62], ["ব্রেড ৩৫০ গ্রাম", 405, 34], ["ব্রেড ২৫০ গ্রাম", 312, 26],
            ["ব্রেড ১৫০ গ্রাম", 320, 19], ["ব্রেড ৩০০ গ্রাম", 460, 39], ["ফেসবান", 480, 4],
            ["বাটারবান", 900, 8], ["মেগা বাটার", 550, 13], ["ভেনিলা বান", 900, 8],
            ["চকোলেট বান", 900, 8], ["হানিকম", 550, 12], ["ফ্যামেলি কেক", 1380, 23],
            ["সলাইস কেক", 940, 8], ["মেঘা লুস", 410, 12], ["ক্রিম রোল", 685, 12],
            ["সেন্ডুস কেক", 540, 8], ["ক্রিম ফিল", 540, 8], ["ফ্রুট কেক", 960, 96],
            ["প্লেন কেক", 820, 82], ["মুরব্বা বান", 343, 12], ["ডোনাট", 873, 15],
            ["ঘি টোস্ট", 940, 20], ["ঘি পাতা", 720, 8], ["রাস্ক টোস্ট", 310, 52],
            ["রোমা", 940, 47], ["পিলো", 360, 8], ["লেয়ার কেক", 270, 4],
            ["বিস্কিট", 180, 4], ["মামা ১২", 460, 39], ["মামা ১০", 385, 39],
            ["মামা ছোট", 270, 90], ["মামা ভাঙা", 460, 39], ["মামা পাতা", 870, 8],
            ["ড্রাই বড়", 675, 112], ["ড্রাই কেক P", 540, 8], ["ডোনাট ২০", 873, 16],
            ["কুকিস", 670, 112], ["সেরো", 552, 69], ["জাম ব্রেড", 364, 12],
            ["পাই কেক", 830, 12], ["রোমা বড়", 1340, 112], ["কোকোনাট", 735, 16],
            ["ড্রাই বিস্কুট", 282, 24], ["কিসমিস", 1275, 53], ["লাডু", 720, 60], ["শনপাপড়ি", 1800, 150], ["ফ্রুট বান", 525, 15],
            ["মিল্কব্রেড ৬০০", 410, 69], ["ক্রিম ব্রেড", 720, 7.5]
        ];

        let products = JSON.parse(localStorage.getItem('rgs_inventory')) || defaultProducts;
        let state = products.map(() => ({ carton: 0, piece: 0 }));

        function init() {
            renderProducts();
            document.getElementById('saleDate').valueAsDate = new Date();
            updateTotals();
        }

        function renderProducts() {
            const container = document.getElementById('productArea');
            container.innerHTML = '';
            const search = document.getElementById('searchInput').value.toLowerCase();

            products.forEach((p, i) => {
                if (p[0].toLowerCase().includes(search)) {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    const itemTotal = (state[i].carton * p[1]) + (state[i].piece * p[2]);
                    card.innerHTML = `
                        <div class="card-header">
                            <h3 class="product-name">${p[0]}</h3>
                            <div class="item-total" id="total-${i}">${Math.round(itemTotal)}</div>
                        </div>
                        <div class="price-info">Ctn: ${p[1]} | Pcs: ${p[2]}</div>
                        <div class="interaction-row">
                            <div class="qty-box">
                                <span class="qty-label">Carton</span>
                                <div class="qty-controls">
                                    <button class="btn-circle" onclick="updateQty(${i}, 'carton', -0.5)">−</button>
                                    <span class="qty-value" id="val-carton-${i}">${state[i].carton}</span>
                                    <button class="btn-circle" onclick="updateQty(${i}, 'carton', 0.5)">+</button>
                                </div>
                            </div>
                            <div class="qty-box">
                                <span class="qty-label">Piece</span>
                                <div class="qty-controls">
                                    <button class="btn-circle" onclick="updateQty(${i}, 'piece', -1)">−</button>
                                    <span class="qty-value" id="val-piece-${i}">${state[i].piece}</span>
                                    <button class="btn-circle" onclick="updateQty(${i}, 'piece', 1)">+</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        function updateQty(idx, type, delta) {
            state[idx][type] = Math.max(0, state[idx][type] + delta);
            const valEl = document.getElementById(`val-${type}-${idx}`);
            if (valEl) valEl.innerText = state[idx][type];

            const p = products[idx];
            const itemTotal = (state[idx].carton * p[1]) + (state[idx].piece * p[2]);
            const totalEl = document.getElementById(`total-${idx}`);
            if (totalEl) totalEl.innerText = Math.round(itemTotal);

            updateTotals();
        }

        function updateTotals() {
            let grand = 0;
            products.forEach((p, i) => {
                grand += (state[i].carton * p[1]) + (state[i].piece * p[2]);
            });

            const deposit = parseFloat(document.getElementById('depositAmount').value) || 0;
            const twoPercent = Math.round(grand * 1.02);
            const due = Math.round(twoPercent - deposit);

            document.getElementById('grandTotal').innerText = Math.round(grand);
            document.getElementById('twoPercent').innerText = twoPercent;
            document.getElementById('dueAmount').innerText = due;
        }

        function resetForm() {
            state = products.map(() => ({ carton: 0, piece: 0 }));
            document.getElementById('depositAmount').value = '';
            document.getElementById('dsrName').value = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('saleDate').valueAsDate = new Date();
            renderProducts();
            updateTotals();
        }

        function saveDraft() {
            const dsrName = document.getElementById('dsrName').value;
            const saleDate = document.getElementById('saleDate').value;
            if (!dsrName || !saleDate) {
                alert('দয়া করে DSR নাম এবং তারিখ প্রদান করুন।');
                return;
            }
            const draft = {
                dsrName: dsrName,
                saleDate: saleDate,
                state: state,
                deposit: document.getElementById('depositAmount').value,
                productSnapshot: products
            };
            const key = `draft_${dsrName.replace(/[^a-z0-9]/gi, '_')}_${saleDate}_${Date.now()}`;
            localStorage.setItem(key, JSON.stringify(draft));
            alert('Draft saved successfully!');
        }

        function loadDraft() {
            document.getElementById('historyOverlay').style.display = 'block';
            renderDraftList();
        }

        function renderDraftList() {
            const container = document.getElementById('fileListContainer');
            container.innerHTML = '';
            let drafts = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('draft_')) {
                    drafts.push({ key: key, data: JSON.parse(localStorage.getItem(key)) });
                }
            }

            // Sort by date descending
            drafts.sort((a, b) => new Date(b.data.saleDate) - new Date(a.data.saleDate));

            if (drafts.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:20px;">No saved drafts found.</p>';
                return;
            }

            drafts.forEach(item => {
                const draft = item.data;
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div class="file-info" style="font-size: 14px;">
                        <strong>${draft.dsrName}</strong><br>
                        <small>${draft.saleDate}</small>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-view" style="background: #2e7d32; color: white;" onclick="applyDraft('${item.key}')">Load</button>
                        <button class="btn-view" style="background: #d32f2f; color: white;" onclick="deleteDraft('${item.key}')">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function applyDraft(key) {
            const draft = JSON.parse(localStorage.getItem(key));
            if (!draft) return;

            document.getElementById('dsrName').value = draft.dsrName || '';
            document.getElementById('saleDate').value = draft.saleDate || '';
            document.getElementById('depositAmount').value = draft.deposit || '';

            if (Array.isArray(draft.state)) {
                state = products.map((_, i) => {
                    return draft.state[i] ? { ...draft.state[i] } : { carton: 0, piece: 0 };
                });
            } else {
                state = products.map(() => ({ carton: 0, piece: 0 }));
            }

            renderProducts();
            updateTotals();
            hideHistory();
            alert('Draft loaded!');
        }

        function deleteDraft(key) {
            if (confirm('Delete this draft?')) {
                localStorage.removeItem(key);
                renderDraftList();
            }
        }

        async function generatePDF() {
            const dsr = document.getElementById('dsrName').value || "Sales";
            const date = document.getElementById('saleDate').value;
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');

            const activeItems = products.map((p, i) => ({
                name: p[0], ctn: state[i].carton, pcs: state[i].piece, total: (state[i].carton * p[1]) + (state[i].piece * p[2])
            })).filter(item => item.ctn > 0 || item.pcs > 0);

            if (activeItems.length === 0) { alert("Please add at least one product with quantity > 0"); return; }

            const deposit = parseFloat(document.getElementById('depositAmount').value) || 0;
            const grandTotalValue = activeItems.reduce((s, x) => s + x.total, 0);
            const twoPercentValue = Math.round(grandTotalValue * 1.02);
            const dueValue = Math.round(twoPercentValue - deposit);

            document.getElementById('pdfDsr').innerText = "DSR: " + dsr;
            document.getElementById('pdfDate').innerText = "Date: " + date;
            document.getElementById('pdfGrandTotal').innerText = Math.round(grandTotalValue);
            document.getElementById('pdfTwoPercent').innerText = twoPercentValue;
            document.getElementById('pdfDeposit').innerText = Math.round(deposit);
            document.getElementById('pdfDue').innerText = dueValue;

            const capture = document.getElementById('pdfCapture');
            const tbody = document.getElementById('pdfTableBody');
            const pdfHeader = document.getElementById('pdfHeader');
            const summary = document.getElementById('pdfSummarySection');
            const footer = document.getElementById('pdfFooterSection');

            capture.style.position = 'static';
            capture.style.left = '0';
            capture.style.width = '800px';

            let pageNum = 0;
            async function addCurrentPageToPdf() {
                const canvas = await html2canvas(capture, { scale: 2, logging: false, useCORS: true });
                if (pageNum > 0) pdf.addPage();
                const imgData = canvas.toDataURL('image/png');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pageNum++;
            }

            tbody.innerHTML = '';
            pdfHeader.style.display = 'block';
            summary.style.display = 'none';
            footer.style.display = 'none';

            for (let i = 0; i < activeItems.length; i++) {
                const item = activeItems[i];
                const rowHtml = `<tr>
                    <td style="border:1px solid #ccc; padding:10px;">${item.name}</td>
                    <td style="border:1px solid #ccc; padding:10px; text-align:center;">${item.ctn}</td>
                    <td style="border:1px solid #ccc; padding:10px; text-align:center;">${item.pcs}</td>
                    <td style="border:1px solid #ccc; padding:10px; text-align:right;">${Math.round(item.total)}</td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', rowHtml);

                if (capture.offsetHeight > 1000) {
                    tbody.lastElementChild.remove();
                    await addCurrentPageToPdf();
                    pdfHeader.style.display = 'none';
                    tbody.innerHTML = rowHtml;
                }
            }

            summary.style.display = 'flex';
            footer.style.display = 'block';
            if (capture.offsetHeight > 1050) {
                summary.style.display = 'none';
                footer.style.display = 'none';
                await addCurrentPageToPdf();
                pdfHeader.style.display = 'none';
                tbody.innerHTML = '';
                summary.style.display = 'flex';
                footer.style.display = 'block';
            }
            await addCurrentPageToPdf();

            capture.style.position = 'absolute';
            capture.style.left = '-9999px';

            const fileName = dsr.replace(/[^a-z0-9]/gi, '_') + "_" + date + ".pdf";
            if (window.AndroidInterface) {
                const base64 = pdf.output('datauristring').split(',')[1];
                window.AndroidInterface.downloadPdf(base64, fileName);
                setTimeout(loadFiles, 800);
            } else {
                pdf.save(fileName);
            }
        }

        // --- PRODUCT MANAGEMENT ---
        function showSettings() {
            document.getElementById('settingsOverlay').style.display = 'block';
            document.getElementById('manageFormContainer').style.display = 'none'; // HIDDEN BY DEFAULT
            renderManageList();
        }

        function hideSettings() {
            document.getElementById('settingsOverlay').style.display = 'none';
            resetProductForm();
        }

        function toggleManageForm() {
            const container = document.getElementById('manageFormContainer');
            const toggleBtn = document.getElementById('btnToggleForm');

            if (container.style.display === 'none') {
                container.style.display = 'block';
                toggleBtn.innerText = 'Close Form';
            } else {
                resetProductForm();
                toggleBtn.innerText = '+ Add New Product';
            }
        }

        function renderManageList() {
            const container = document.getElementById('manageListContainer');
            container.innerHTML = '';
            products.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = 'manage-item';
                item.innerHTML = `
                    <div class="manage-info">
                        <strong>${p[0]}</strong>
                        <span>Ctn: ${p[1]} | Pcs: ${p[2]}</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-small btn-edit" onclick="editProduct(${i})">Edit</button>
                        <button class="btn-small btn-delete" onclick="deleteProduct(${i})">Delete</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function saveProduct() {
            const name = document.getElementById('newProductName').value;
            const ctn = parseFloat(document.getElementById('newCartonPrice').value);
            const pcs = parseFloat(document.getElementById('newPiecePrice').value);
            const index = parseInt(document.getElementById('editIndex').value);

            if (!name || isNaN(ctn) || isNaN(pcs)) {
                alert('Please fill all fields correctly.');
                return;
            }

            if (index === -1) {
                // Add new
                products.push([name, ctn, pcs]);
                state.push({ carton: 0, piece: 0 });
            } else {
                // Update existing
                products[index] = [name, ctn, pcs];
            }

            saveAndRefresh();
            resetProductForm();
            alert(index === -1 ? 'Product added!' : 'Product updated!');
        }

        function editProduct(i) {
            const p = products[i];
            document.getElementById('newProductName').value = p[0];
            document.getElementById('newCartonPrice').value = p[1];
            document.getElementById('newPiecePrice').value = p[2];
            document.getElementById('editIndex').value = i;

            document.getElementById('manageFormTitle').innerText = 'Edit Product';
            document.getElementById('btnSaveProduct').innerText = 'Update Product';

            // AUTOMATICALLY SHOW FORM ON EDIT
            const container = document.getElementById('manageFormContainer');
            container.style.display = 'block';
            document.getElementById('btnToggleForm').innerText = 'Close Form';
            document.getElementById('btnCancelEdit').style.display = 'block';

            // SMART AUTO-SCROLL LOGIC
            const overlayContent = document.getElementById('settingsOverlayContent');
            if (overlayContent) {
                overlayContent.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // AUTO FOCUS
            setTimeout(() => {
                const nameInput = document.getElementById('newProductName');
                nameInput.focus();
                // Move cursor to end of text
                const val = nameInput.value;
                nameInput.value = '';
                nameInput.value = val;
            }, 300);
        }

        function deleteProduct(i) {
            if (confirm('Delete this product?')) {
                products.splice(i, 1);
                state.splice(i, 1);
                saveAndRefresh();
            }
        }

        function resetInventory() {
            if (confirm('Restore to default products? All custom products will be lost.')) {
                products = JSON.parse(JSON.stringify(defaultProducts));
                state = products.map(() => ({ carton: 0, piece: 0 }));
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('rgs_inventory', JSON.stringify(products));
            renderManageList();
            renderProducts();
            updateTotals();
        }

        function resetProductForm() {
            document.getElementById('newProductName').value = '';
            document.getElementById('newCartonPrice').value = '';
            document.getElementById('newPiecePrice').value = '';
            document.getElementById('editIndex').value = '-1';

            document.getElementById('manageFormTitle').innerText = 'Add New Product';
            document.getElementById('btnSaveProduct').innerText = 'Add Product';
            document.getElementById('manageFormContainer').style.display = 'none';
            document.getElementById('btnToggleForm').innerText = '+ Add New Product';
        }

        function showHistory() {
            document.getElementById('historyOverlay').style.display = 'block';
            loadFiles();
        }

        function hideHistory() {
            document.getElementById('historyOverlay').style.display = 'none';
        }

        function loadFiles() {
            const container = document.getElementById('fileListContainer');
            container.innerHTML = '<p style="text-align:center; padding:20px;">Loading...</p>';
            if (window.AndroidInterface) {
                let files = JSON.parse(window.AndroidInterface.getSavedFiles());
                if (files.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:20px;">No saved reports found.</p>';
                    return;
                }

                // Sort reports by filename/date assuming format: DSRName_YYYY-MM-DD.pdf
                files.sort((a, b) => {
                    const dateA = a.split('_').pop().replace('.pdf', '');
                    const dateB = b.split('_').pop().replace('.pdf', '');
                    return new Date(dateB) - new Date(dateA);
                });

                container.innerHTML = '';
                files.forEach(fileName => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div class="file-info">${fileName}</div>
                        <button class="btn-view" onclick="window.AndroidInterface.openPdfFile('${fileName}')">Open</button>
                    `;
                    container.appendChild(item);
                });
            } else {
                container.innerHTML = '<p style="text-align:center; padding:20px;">Android Interface not found.</p>';
            }
        }

        document.getElementById('searchInput').addEventListener('input', renderProducts);
        document.getElementById('depositAmount').addEventListener('input', updateTotals);

        init();
    </script>
</body>
</html>
